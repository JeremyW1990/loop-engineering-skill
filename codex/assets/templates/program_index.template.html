<!DOCTYPE html>
<!--
  codex loop-engineering - PROGRAM INDEX
  This page renders itself from the JSON in <script id="program-data">.
  Ticket and subtask pages are authoritative; refresh-index rebuilds this snapshot.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Program index</title>
<script id="program-data" type="application/json">
{
  "kind": "program",
  "sprint": "",
  "id": "",
  "slug": "",
  "title": "",
  "goal": "",
  "updated": "",
  "ticketOrder": [],
  "tickets": [],
  "rollup": {
    "tickets": { "total": 0, "todo": 0, "in_progress": 0, "blocked": 0, "done": 0 },
    "subtasks": { "total": 0, "todo": 0, "in_progress": 0, "blocked": 0, "done": 0 }
  },
  "generatedFrom": ""
}
</script>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 2rem; max-width: 1180px; }
  h1 { font-size: 1.7rem; margin: 0 0 .25rem; }
  h2 { font-size: 1.15rem; margin: 2rem 0 .6rem; border-bottom: 1px solid #8884; padding-bottom: .3rem; }
  h3 { margin: 0; font-size: 1rem; }
  a { color: #2f6feb; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .85em; background: #8882; padding: .05rem .35rem; border-radius: 4px; }
  .muted { opacity: .65; }
  .goal { background: #8881; border-radius: 8px; padding: .8rem 1rem; margin: 1rem 0; }
  .summary { display: flex; gap: .5rem; flex-wrap: wrap; margin: 1rem 0; }
  .chip { display: inline-block; border-radius: 999px; padding: .16rem .65rem; font-size: .78rem; font-weight: 600; }
  .chip.todo { background: #8883; }
  .chip.in_progress { background: #2f6feb33; color: #2f6feb; }
  .chip.blocked { background: #d1242f33; color: #d1242f; }
  .chip.done { background: #1a7f3733; color: #1a7f37; }
  .ticket { border: 1px solid #8884; border-radius: 10px; padding: 1rem 1.1rem; margin: .9rem 0; }
  .ticket-head { display: flex; justify-content: space-between; gap: 1rem; align-items: flex-start; }
  .links { white-space: nowrap; font-size: .9rem; }
  .meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: .35rem 1rem; margin: .75rem 0; font-size: .9rem; }
  table { border-collapse: collapse; width: 100%; margin-top: .75rem; }
  th, td { text-align: left; padding: .4rem .5rem; border-bottom: 1px solid #8883; vertical-align: top; font-size: .88rem; }
  th { font-weight: 600; opacity: .75; }
  .empty { opacity: .6; font-style: italic; }
</style>
</head>
<body>
<div id="render"></div>
<script>
(function () {
  var d;
  try { d = JSON.parse(document.getElementById('program-data').textContent); }
  catch (e) { document.getElementById('render').innerHTML = '<p class="empty">program-data JSON is invalid: ' + e + '</p>'; return; }
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); };
  var chip = function (state) { state = state || 'todo'; return '<span class="chip ' + esc(state) + '">' + esc(state.replace('_', ' ')) + '</span>'; };
  var link = function (href, label) { return '<a href="' + esc(href) + '">' + esc(label) + '</a>'; };
  var counts = function (label, value) {
    value = value || {};
    return '<span><b>' + esc(label) + ':</b> ' + esc(value.total || 0) + ' total / ' + esc(value.done || 0) + ' done / ' + esc(value.in_progress || 0) + ' active / ' + esc(value.blocked || 0) + ' blocked</span>';
  };
  var tickets = d.tickets || [];
  var h = '<h1>' + (esc(d.title) || 'Program index') + '</h1>';
  h += '<div class="muted"><code>' + esc(d.id) + '</code> - <code>' + esc(d.slug) + '</code> - ' + esc(d.sprint) + ' - updated ' + (esc(d.updated) || '-') + '</div>';
  if (d.goal) h += '<div class="goal">' + esc(d.goal) + '</div>';
  h += '<div class="summary">' + counts('Tickets', (d.rollup || {}).tickets) + counts('Subtasks', (d.rollup || {}).subtasks) + '</div>';
  h += '<h2>Tickets (' + tickets.length + ')</h2>';
  if (!tickets.length) h += '<p class="empty">No tickets yet.</p>';
  tickets.forEach(function (t) {
    h += '<section class="ticket"><div class="ticket-head"><h3><code>' + esc(t.id) + '</code> - ' + esc(t.title) + '</h3><div class="links">' + link(t.plan, 'plan') + ' · ' + link(t.statusPage, 'status') + '</div></div>';
    h += '<div class="meta"><div><b>State:</b> ' + chip(t.status) + '</div><div><b>Phase:</b> ' + (esc(t.phase) || '-') + '</div><div><b>Depends on:</b> ' + ((t.dependsOn || []).map(function (x) { return '<code>' + esc(x) + '</code>'; }).join(' ') || '-') + '</div><div><b>PR:</b> ' + (t.pr ? '#' + esc(t.pr) : '-') + '</div><div><b>Branch:</b> ' + (t.branch ? '<code>' + esc(t.branch) + '</code>' : '-') + '</div></div>';
    var subs = t.subtasks || [];
    if (!subs.length) h += '<p class="empty">No subtasks.</p>';
    else {
      h += '<table><thead><tr><th>Subtask</th><th>State</th><th>Phase</th><th>Required</th><th>Pages</th></tr></thead><tbody>';
      subs.forEach(function (s) {
        h += '<tr><td><code>' + esc(s.id) + '</code> - ' + esc(s.title) + '</td><td>' + chip(s.status) + '</td><td>' + (esc(s.phase) || '-') + '</td><td>' + (s.required === false ? 'optional' : 'required') + '</td><td>' + link(s.plan, 'plan') + ' · ' + link(s.statusPage, 'status') + '</td></tr>';
      });
      h += '</tbody></table>';
    }
    h += '</section>';
  });
  document.getElementById('render').innerHTML = h;
})();
</script>
</body>
</html>
