<!DOCTYPE html>
<!--
  loop-engineering · TICKET SPEC (one ticket)
  ────────────────────────────────────────────────────────────────────────
  ONE ticket per file: <sprintFolder>/<slug>_ticket.html — pairs with <slug>_status.html.
  A sprint folder holds MANY such pairs (one per ticket), not a single plan+status.
  This page renders itself from the JSON in <script id="ticket-data">.
  The loop edits ONLY that JSON block — never the markup below it.

  ticket-data shape:
  {
    "sprint":        "docs/sprint_N",            // the sprint folder
    "id":            "S1-T1",                    // stable ticket id (this is what dependsOn references)
    "slug":          "split-other-income",       // == this file's basename (the <slug> in <slug>_ticket.html)
    "title":         "short ticket title",
    "goal":          "one-sentence goal",
    "surfaces":      ["api","admin"],            // backend labels + UI surface names
    "acceptance":    ["criterion 1","criterion 2"],
    "outOfScope":    ["..."],
    "dependsOn":     [],                          // ids of OTHER tickets that must merge first
    "detailed":      true,                        // false = scaffold; the loop pauses to ask
    "generatedFrom": "YYYY-MM-DD by /loop-engineering",
    "record":        null                         // filled by the loop after THIS ticket merges:
    //   { "pr": 123, "mergedAt": "YYYY-MM-DD",
    //     "design":   { "summary","core","dataModel","surfaces","acceptanceCriteria" },
    //     "techSpec": { "summary","fileChanges","apiContracts","dataModel","sequencing","edgeCases" } }
  }
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ticket</title>
<script id="ticket-data" type="application/json">
{
  "sprint": "",
  "id": "",
  "slug": "",
  "title": "",
  "goal": "",
  "surfaces": [],
  "acceptance": [],
  "outOfScope": [],
  "dependsOn": [],
  "detailed": true,
  "generatedFrom": "",
  "record": null
}
</script>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 2rem; max-width: 900px; }
  h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
  h2 { font-size: 1.15rem; margin: 1.6rem 0 .6rem; border-bottom: 1px solid #8884; padding-bottom: .3rem; }
  .muted { opacity: .65; }
  .field { margin: .5rem 0; }
  .field b { opacity: .75; font-weight: 600; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .85em; background: #8882; padding: .05rem .35rem; border-radius: 4px; }
  .pill { display: inline-block; font-size: .72rem; padding: .08rem .5rem; border-radius: 999px; background: #8883; margin: 0 .2rem .2rem 0; }
  .scaffold { color: #b8860b; font-weight: 600; }
  ul { margin: .3rem 0 .3rem 1.1rem; padding: 0; }
  .empty { opacity: .6; font-style: italic; }
  .merged { border-left: 4px solid #1a7f37; background: #1a7f3714; border-radius: 6px; padding: .7rem 1rem; margin: 1rem 0; }
  .record { border: 1px solid #8884; border-radius: 8px; padding: .8rem 1rem; margin: .8rem 0; }
  .record h3 { margin: 0 0 .4rem; font-size: 1rem; }
  pre { background: #8881; border-radius: 8px; overflow: auto; padding: .75rem .9rem; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="render"></div>
<script>
(function () {
  var d;
  try { d = JSON.parse(document.getElementById('ticket-data').textContent); }
  catch (e) { document.getElementById('render').innerHTML = '<p class="empty">ticket-data JSON is invalid: ' + e + '</p>'; return; }
  var esc = function (s) { return String(s == null ? '' : s).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); };
  var listOf = function (arr) { return (arr && arr.length) ? '<ul>' + arr.map(function (x) { return '<li>' + esc(typeof x === 'string' ? x : (x.text || JSON.stringify(x, null, 2))) + '</li>'; }).join('') + '</ul>' : '<span class="empty">—</span>'; };
  var pills = function (arr) { return (arr && arr.length) ? arr.map(function (x) { return '<span class="pill">' + esc(x) + '</span>'; }).join('') : '<span class="empty">—</span>'; };
  var renderValue = function (value) {
    if (value == null || value === '') return '<span class="empty">—</span>';
    if (Array.isArray(value)) return listOf(value);
    if (typeof value === 'object') return '<pre>' + esc(JSON.stringify(value, null, 2)) + '</pre>';
    return esc(value);
  };
  var renderRecordObject = function (label, value) {
    if (!value) return '';
    var h = '<div class="record"><h3>' + esc(label) + '</h3>';
    if (typeof value !== 'object' || Array.isArray(value)) return h + renderValue(value) + '</div>';
    Object.keys(value).forEach(function (key) {
      h += '<div class="field"><b>' + esc(key) + ':</b> ' + renderValue(value[key]) + '</div>';
    });
    return h + '</div>';
  };
  var h = '';
  h += '<h1>' + (esc(d.title) || 'Ticket') + (d.detailed === false ? ' <span class="scaffold">· scaffold</span>' : '') + '</h1>';
  h += '<div class="muted"><code>' + esc(d.id) + '</code> · <code>' + esc(d.slug) + '</code> · ' + esc(d.sprint || '') + (d.generatedFrom ? ' · generated ' + esc(d.generatedFrom) : '') + '</div>';
  h += '<div class="field"><b>Goal:</b> ' + esc(d.goal) + '</div>';
  h += '<div class="field"><b>Surfaces:</b> ' + pills(d.surfaces) + '</div>';
  h += '<div class="field"><b>Depends on:</b> ' + pills(d.dependsOn) + '</div>';
  h += '<h2>Acceptance</h2>' + listOf(d.acceptance);
  if (d.outOfScope && d.outOfScope.length) h += '<h2>Out of scope</h2>' + listOf(d.outOfScope);

  var r = d.record;
  if (r) {
    h += '<div class="merged"><b>Merged</b> ' + esc(r.mergedAt || '') + (r.pr ? ' in <code>#' + esc(r.pr) + '</code>' : '') + '</div>';
    h += '<h2>Record</h2>';
    h += renderRecordObject('Design', r.design);
    h += renderRecordObject('Tech spec', r.techSpec);
  }
  document.getElementById('render').innerHTML = h;
})();
</script>
</body>
</html>
